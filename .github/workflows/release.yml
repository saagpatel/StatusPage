name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive image names
        id: meta
        run: |
          REPO_LOWER=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "repo_lower=${REPO_LOWER}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.web
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/web:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/web:latest

      - name: Build and push api image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.api-server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/api-server:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/api-server:latest

      - name: Build and push monitor image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile.monitor
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/monitor:${{ steps.meta.outputs.version }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/monitor:latest

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Containers
            - `${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/web:${{ steps.meta.outputs.version }}`
            - `${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/api-server:${{ steps.meta.outputs.version }}`
            - `${{ env.REGISTRY }}/${{ steps.meta.outputs.repo_lower }}/monitor:${{ steps.meta.outputs.version }}`
